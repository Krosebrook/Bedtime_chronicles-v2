<style>
        .starfield {
            background-image: 
                radial-gradient(1px 1px at 10% 10%, #fff 100%, transparent 100%),
                radial-gradient(1px 1px at 30% 50%, #fff 100%, transparent 100%),
                radial-gradient(2px 2px at 70% 30%, #fff 100%, transparent 100%),
                radial-gradient(1px 1px at 90% 80%, #fff 100%, transparent 100%),
                radial-gradient(1.5px 1.5px at 50% 90%, #fff 100%, transparent 100%);
            background-size: 200px 200px;
            animation: twinkle 5s infinite linear;
        }
        @keyframes twinkle {
            0% { opacity: 0.8; }
            50% { opacity: 0.5; }
            100% { opacity: 0.8; }
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background min-h-screen relative overflow-x-hidden font-body-base selection:bg-primary-container selection:text-on-primary-container pb-[100px]">
<!-- Animated Starfield Background -->
<div class="fixed inset-0 starfield pointer-events-none z-[-1]"></div>
<div class="fixed inset-0 bg-gradient-to-b from-transparent to-background/90 pointer-events-none z-[-1]"></div>
<!-- TopAppBar -->
<header class="flex justify-between items-center px-margin-screen h-touch-target-large w-full z-50 docked full-width top-0 bg-transparent bg-background/80 backdrop-blur-lg flat no shadows hover:opacity-80 transition-opacity">
<button aria-label="Go back" class="h-touch-target-min w-touch-target-min flex items-center justify-center text-primary Active: scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-display text-headline-lg text-primary text-center flex-1 mx-4">Infinity Heroes</h1>
<button aria-label="Profile" class="h-touch-target-min w-touch-target-min flex items-center justify-center text-primary Active: scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="face_6">face_6</span>
</button>
</header>
<!-- Main Canvas -->
<main class="w-full max-w-md mx-auto relative z-10 pt-stack-md px-gutter flex flex-col gap-stack-lg">
<!-- Search Bar -->
<section class="w-full">
<div class="glass-card rounded-full flex items-center px-4 h-touch-target-min focus-within:ring-2 ring-primary transition-all">
<span class="material-symbols-outlined text-primary mr-3" data-icon="search">search</span>
<input class="bg-transparent border-none outline-none text-on-background w-full font-body-base placeholder-textMuted h-full" placeholder="Find a story..." type="text"/>
<button aria-label="Voice search" class="h-touch-target-min w-10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="mic" data-weight="fill" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
</div>
</section>
<!-- Stories Grid (1 Column) -->
<div class="flex flex-col gap-stack-lg w-full">
<!-- Story Card 1 -->

<div class="absolute inset-0 bg-gradient-to-t from-background via-background/40 to-transparent"></div>
<div class="absolute bottom-0 left-0 w-full p-stack-md flex flex-col gap-stack-sm">
<div class="flex items-center gap-2 mb-1">
<span class="bg-primary-container/20 text-primary border border-primary/30 rounded-full px-3 py-1 font-label-sm text-label-sm backdrop-blur-md">Adventure</span>
<span class="flex items-center text-secondary font-caption text-caption gap-1">
<span class="material-symbols-outlined text-[14px]" data-icon="star" data-weight="fill" style="font-variation-settings: 'FILL' 1;">star</span> 4.9
                        </span>
</div>
<h2 class="font-headline-xl text-headline-xl text-on-background m-0 drop-shadow-lg leading-tight tracking-wide">The Cosmic Whale</h2>
<p class="font-body-base text-body-base text-on-surface-variant m-0 flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]" data-icon="schedule">schedule</span> 12 mins
                    </p>
</div>
<!-- Play Button Overlay -->
<div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-16 h-16 bg-primary/20 backdrop-blur-md rounded-full flex items-center justify-center border border-primary/50 opacity-0 group-hover:opacity-100 transition-opacity duration-300 shadow-[0_0_20px_rgba(192,193,255,0.4)]">
<span class="material-symbols-outlined text-on-background text-3xl ml-1" data-icon="play_arrow" data-weight="fill" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</div>
</article>
<!-- Story Card 2 -->
<article class="relative w-full aspect-[3/4] rounded-xl overflow-hidden glass-card group cursor-pointer">

<div class="absolute inset-0 bg-gradient-to-t from-background via-background/40 to-transparent"></div>
<div class="absolute bottom-0 left-0 w-full p-stack-md flex flex-col gap-stack-sm">
<div class="flex items-center gap-2 mb-1">
<span class="bg-secondary-container/20 text-secondary border border-secondary/30 rounded-full px-3 py-1 font-label-sm text-label-sm backdrop-blur-md">Dreamland</span>
<span class="flex items-center text-secondary font-caption text-caption gap-1">
<span class="material-symbols-outlined text-[14px]" data-icon="star" data-weight="fill" style="font-variation-settings: 'FILL' 1;">star</span> 4.8
                        </span>
</div>
<h2 class="font-headline-xl text-headline-xl text-on-background m-0 drop-shadow-lg leading-tight tracking-wide">Cotton Candy Galaxy</h2>
<p class="font-body-base text-body-base text-on-surface-variant m-0 flex items-center gap-2">

</div>
<div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-16 h-16 bg-primary/20 backdrop-blur-md rounded-full flex items-center justify-center border border-primary/50 opacity-0 group-hover:opacity-100 transition-opacity duration-300 shadow-[0_0_20px_rgba(192,193,255,0.4)]">
<span class="material-symbols-outlined text-on-background text-3xl ml-1" data-icon="play_arrow" data-weight="fill" style="font-variation-settings: 'FILL' 1;">play_arrow</span>

</div>

<button aria-label="Home" class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors h-touch-target-min w-16">
<span class="material-symbols-outlined mb-1" data-icon="home">home</span>
<span class="font-label-md text-label-md font-display">Home</span>

<button aria-label="Stories" class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-6 py-2 shadow-[0_0_15px_rgba(128,131,255,0.4)] h-touch-target-large hover:text-primary transition-colors Active: scale-90 duration-200">
