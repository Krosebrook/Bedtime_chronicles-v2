<style>
        /* Cosmic Background Effects */
        .stars {
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 50px 160px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 90px 40px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 130px 80px, #c0c1ff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 160px 120px, #ffffff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: twinkle 5s infinite linear;
        }

        .nebula {
            background: radial-gradient(circle at 50% 0%, rgba(128, 131, 255, 0.15) 0%, transparent 60%),
                        radial-gradient(circle at 0% 100%, rgba(238, 152, 0, 0.1) 0%, transparent 50%);
        }

        @keyframes twinkle {
            0% { opacity: 0.7; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(-10px); }
            100% { opacity: 0.7; transform: translateY(0); }
        }

        /* Glassmorphism utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Cosmic Book Spine effect */
        .cosmic-book {
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .cosmic-book:active {
            transform: scale(0.98);
        }
        .cosmic-book::before {
            content: '';
            position: absolute;
            left: -10px;
            top: 0;
            bottom: 0;
            width: 10px;
            background: linear-gradient(90deg, rgba(0,0,0,0.6), transparent);
            border-top-left-radius: 12px;
            border-bottom-left-radius: 12px;
            z-index: 10;
        }
    </style>
